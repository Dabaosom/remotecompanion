name: Build Tweak

on:
  push:
    branches: [main]
    paths:
      - 'Tweak/**'
      - 'RemoteCompanion/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'Tweak/**'
      - 'RemoteCompanion/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos
      TARGET: iphone:clang:latest:17.0
      ARCHS: arm64 arm64e
      THEOS_PACKAGE_SCHEME: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install THEOS
        run: |
          brew install ldid xz
          # Clone THEOS
          git clone --depth=1 https://github.com/theos/theos.git $THEOS
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Find iOS SDK
        id: sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "sdk=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "SDK: $SDK_PATH"

      - name: Build tweak
        env:
          SDK_PATH: ${{ steps.sdk.outputs.sdk }}
        run: |
          cd Tweak
          # Symlink correct SDK
          mkdir -p $THEOS/sdks
          ln -sfn "$SDK_PATH" $THEOS/sdks/iPhoneOS17.4.sdk
          # Patch Makefile to use detected SDK
          sed -i '' 's|iPhoneOS16\.5\.sdk|iPhoneOS17.4.sdk|g' Makefile
          # Build
          make clean 2>/dev/null || true
          make -j$(sysctl -n hw.ncpu) THEOS=$THEOS THEOS_DEVICE_IP=127.0.0.1 THEOS_PACKAGE_SCHEME=$THEOS_PACKAGE_SCHEME

      - name: Package .deb
        run: |
          cd Tweak
          make package FINALPACKAGE=1 THEOS=$THEOS THEOS_PACKAGE_SCHEME=$THEOS_PACKAGE_SCHEME
          ls -lh *.deb 2>/dev/null || echo "no deb found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: Tweak/*.deb
          retention-days: 7

  build-nativelua:
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install THEOS
        run: |
          brew install ldid xz
          git clone --depth=1 https://github.com/theos/theos.git $THEOS
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Find iOS SDK
        id: sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "sdk=$SDK_PATH" >> $GITHUB_OUTPUT

      - name: Build rc-root subproject
        env:
          SDK_PATH: ${{ steps.sdk.outputs.sdk }}
        run: |
          cd Tweak/rc-root
          ln -sfn "$SDK_PATH" $THEOS/sdks/iPhoneOS17.4.sdk 2>/dev/null || true
          ln -sfn "$THEOS" ../theos_link 2>/dev/null || true
          make -j$(sysctl -n hw.ncpu)

      - name: Build rc-client subproject
        env:
          SDK_PATH: ${{ steps.sdk.outputs.sdk }}
        run: |
          cd Tweak/rc-client
          ln -sfn "$SDK_PATH" $THEOS/sdks/iPhoneOS17.4.sdk 2>/dev/null || true
          ln -sfn "$THEOS" ../theos_link 2>/dev/null || true
          make -j$(sysctl -n hw.ncpu)

      - name: Upload rc-root/client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rc-binaries
          path: |
            Tweak/rc-root/*.dylib
            Tweak/rc-client/*
          retention-days: 7
