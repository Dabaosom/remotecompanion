name: Build Tweak

on:
  push:
    branches: [main]
    paths:
      - 'Tweak/**'
      - 'RemoteCompanion/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'Tweak/**'
      - 'RemoteCompanion/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find iOS SDK
        id: sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_BASENAME=$(basename "$SDK_PATH")
          SDK_VERSION=$(echo "$SDK_BASENAME" | sed 's/iPhoneOS//;s/.sdk//')
          echo "sdk=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "basename=$SDK_BASENAME" >> $GITHUB_OUTPUT
          echo "version=$SDK_VERSION" >> $GITHUB_OUTPUT
          echo "SDK: $SDK_PATH (version: $SDK_VERSION)"

      - name: Install THEOS + ldid
        run: |
          brew install ldid xz
          git clone --depth=1 https://github.com/theos/theos.git $THEOS
          $THEOS/bin/update-theos
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Build tweak
        env:
          SDK_PATH: ${{ steps.sdk.outputs.sdk }}
          SDK_VERSION: ${{ steps.sdk.outputs.version }}
        run: |
          # Symlink SDK with exact name THEOS expects
          mkdir -p $THEOS/sdks
          ln -sfn "$SDK_PATH" "$THEOS/sdks/iPhoneOS$SDK_VERSION.sdk"

          cd Tweak
          # Patch Makefile: SDK path + SDKVERSION in TARGET
          sed -i '' "s|iPhoneOS16\.5\.sdk|iPhoneOS$SDK_VERSION.sdk|g" Makefile
          sed -i '' "s|clang:17\.0:|clang:$SDK_VERSION:|g" Makefile
          sed -i '' "s|iPhoneOS17\.0\.sdk|iPhoneOS$SDK_VERSION.sdk|g" Makefile
          # Remove AppSupport from PRIVATE_FRAMEWORKS (not present in Xcode 15.4 SDK)
          sed -i '' 's| PRIVATE_FRAMEWORKS += AppSupport||g' Makefile

          make clean 2>/dev/null || true
          make -j$(sysctl -n hw.ncpu) \
            THEOS=$THEOS \
            THEOS_DEVICE_IP=127.0.0.1 \
            THEOS_PACKAGE_SCHEME=$THEOS_PACKAGE_SCHEME

      - name: Package .deb
        env:
          SDK_VERSION: ${{ steps.sdk.outputs.version }}
        run: |
          cd Tweak
          make package FINALPACKAGE=1 \
            THEOS=$THEOS \
            THEOS_PACKAGE_SCHEME=$THEOS_PACKAGE_SCHEME
          ls -lh packages/*.deb 2>/dev/null && mv packages/*.deb . 2>/dev/null || ls -lh *.deb 2>/dev/null || echo "no deb found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: Tweak/*.deb
          retention-days: 7

  build-nativelua:
    runs-on: macos-13
    env:
      THEOS: ${{ github.workspace }}/theos
      THEOS_PACKAGE_SCHEME: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find iOS SDK
        id: sdk
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_BASENAME=$(basename "$SDK_PATH")
          SDK_VERSION=$(echo "$SDK_BASENAME" | sed 's/iPhoneOS//;s/.sdk//')
          echo "sdk=$SDK_PATH" >> $GITHUB_OUTPUT
          echo "version=$SDK_VERSION" >> $GITHUB_OUTPUT

      - name: Install THEOS + ldid
        run: |
          brew install ldid xz
          git clone --depth=1 https://github.com/theos/theos.git $THEOS
          $THEOS/bin/update-theos
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Build rc-root
        env:
          SDK_PATH: ${{ steps.sdk.outputs.sdk }}
          SDK_VERSION: ${{ steps.sdk.outputs.version }}
        run: |
          mkdir -p $THEOS/sdks
          ln -sfn "$SDK_PATH" "$THEOS/sdks/iPhoneOS$SDK_VERSION.sdk"
          ln -sfn "$THEOS" Tweak/theos_link
          cd Tweak/rc-root
          make -j$(sysctl -n hw.ncpu)

      - name: Build rc-client
        env:
          SDK_PATH: ${{ steps.sdk.outputs.sdk }}
          SDK_VERSION: ${{ steps.sdk.outputs.version }}
        run: |
          mkdir -p $THEOS/sdks
          ln -sfn "$SDK_PATH" "$THEOS/sdks/iPhoneOS$SDK_VERSION.sdk"
          ln -sfn "$THEOS" Tweak/theos_link
          cd Tweak/rc-client
          make -j$(sysctl -n hw.ncpu)

      - name: Upload rc artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rc-binaries
          path: |
            Tweak/rc-root/*.dylib
            Tweak/rc-client/*
          retention-days: 7
