name: Build RemoteCompanion iOS 17

on:
  push:
    branches: [ main, ios17 ]
    paths:
      - 'Tweak/**'
      - 'RemoteCompanion/**'
      - '.github/workflows/build-ios17.yml'
  pull_request:
    branches: [ main, ios17 ]
    paths:
      - 'Tweak/**'
      - 'RemoteCompanion/**'
      - '.github/workflows/build-ios17.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install ldid + THEOS
      run: |
        # Install ldid (required for code signing)
        brew install ldid xz
        export PATH="/opt/homebrew/bin:$PATH"
        echo "$PATH" >> $GITHUB_PATH
        
        # Clone THEOS if not present
        if [ ! -d "$HOME/theos" ]; then
          git clone --recursive --depth=1 https://github.com/theos/theos.git "$HOME/theos"
        fi
        echo "export THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Install iOS 17.0 SDK
      run: |
        mkdir -p $HOME/theos/sdks
        curl -L -o /tmp/sdk.zip https://github.com/xybp888/iOS-SDKs/releases/download/iOS17.0-SDKs/iPhoneOS17.0.sdk.zip
        unzip -o /tmp/sdk.zip -d $HOME/theos/sdks/

    - name: Build for rootless
      env:
        PATH: "/opt/homebrew/bin:$HOME/bin:$PATH"
      run: |
        export PATH="/opt/homebrew/bin:$PATH"
        export THEOS=$HOME/theos
        # Ensure ldid is available
        which ldid || brew install ldid
        cd Tweak
        make package THEOS_PACKAGE_SCHEME=rootless
        
    - name: Upload deb packages
      uses: actions/upload-artifact@v4
      with:
        name: remotecompanion-debs-rootless
        path: Tweak/packages/*.deb
        
    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: Tweak/packages/*.deb
        tag_name: v3.4.0-ios17
        name: RemoteCompanion v3.4.0 iOS 17 Edition
        body: |
          ## RemoteCompanion v3.4.0 iOS 17 Compatible Edition
          
          ### Changes:
          - Added Siri Actions Daemon injection support
          - Removed Touch ID Single Tap (incompatible with iOS 17)
          - Removed Touch ID Hold (incompatible with iOS 17)
          - Fixed Low Power Mode toggle for iOS 17 (uses NSUserDefaults)
          - Added simulated screen tap/swipe/long-press functions
          - Updated for iOS 17 rootless (Dopamine) and roothide support
          
          ### Compatible with:
          - iOS 14.0 - 17.x
          - Rootful jailbreaks
          - Rootless jailbreaks (Dopamine)
          - Roothide jailbreaks
